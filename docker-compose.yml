services:
  postgres:
    image: postgres:15
    container_name: runq-postgres
    environment:
      POSTGRES_DB: runq
      POSTGRES_USER: runq
      POSTGRES_PASSWORD: runq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api-service/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7
    container_name: runq-redis
    ports:
      - "6379:6379"

  api:
    build: ./api-service
    container_name: runq-api
    ports:
      - "8000:8000"
    volumes:
      - ./documents:/app/documents:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: runq
      POSTGRES_USER: runq
      POSTGRES_PASSWORD: runq
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  worker:
    build: ./worker-service
    container_name: runq-worker
    volumes:
      - ./documents:/app/documents:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: runq
      POSTGRES_USER: runq
      POSTGRES_PASSWORD: runq
      REDIS_HOST: redis
      # Optional Step 8 testing: export RUNQ_FORCE_FAIL_PATH=documents/report_001.txt then up -d worker
      RUNQ_FORCE_FAIL_PATH: ${RUNQ_FORCE_FAIL_PATH:-}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
